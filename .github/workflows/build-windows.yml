name: Build Windows EXE (Onefile)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE with PyInstaller (onefile)
        run: |
          pyinstaller --noconfirm --onefile --windowed --name MedPrepAI app\main.py --add-data "data\knowledge_bases;data\knowledge_bases" \
            --hidden-import sounddevice --hidden-import soundfile --hidden-import cv2 --hidden-import faster_whisper --hidden-import sentence_transformers

      - name: Upload EXE as artifact
        uses: actions/upload-artifact@v4
        with:
          name: MedPrepAI-Windows
          path: dist/MedPrepAI.exe
          retention-days: 30
