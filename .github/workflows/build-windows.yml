name: Build Desktop (Windows + macOS)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-desktop:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies (macOS pinned NumPy)
        if: runner.os == 'macOS'
        env:
          MACOSX_DEPLOYMENT_TARGET: "13.0"
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install numpy==1.26.4
          pip install pyinstaller

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller (onefile)
        shell: bash
        env:
          MACOSX_DEPLOYMENT_TARGET: "13.0"
        run: |
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            sep=";"
          else
            sep=":"
          fi
          pyinstaller --noconfirm --onefile --windowed --name MedPrepAI run_app.py \
            --add-data "data/knowledge_bases${sep}data/knowledge_bases" \
            --hidden-import sounddevice \
            --hidden-import soundfile \
            --hidden-import cv2 \
            --hidden-import faster_whisper \
            --hidden-import sentence_transformers

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: MedPrepAI-Windows
          path: dist/MedPrepAI.exe
          retention-days: 30

      - name: Upload artifact (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: MedPrepAI-macOS
          path: dist/MedPrepAI
          retention-days: 30
